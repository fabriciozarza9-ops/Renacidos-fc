<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Renacidos FC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2') no-repeat center center/cover;
      color: white;
    }

    .overlay {
      background: rgba(0,0,0,0.7);
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(5px);
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      margin-top: 10px;
      background: limegreen;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="overlay">

  <h1>⚽ Renacidos FC</h1>
  <p>¡Donde nacen nuevos jugadores!</p>

  <div class="card">
    <h2>🔥 Únete</h2>
    <p>Busco jugadores para armar partidos</p>
    <p>¡Ven a divertirte y jugar fútbol gratis! ⚽</p>
  </div>

  <div class="card">
    <h2>⏰ Horarios</h2>
    <p>Todos los días</p>
  </div>

  <div class="card">
    <h2>💰 Precio</h2>
    <p>GRATIS 🆓</p>
  </div>

  <div class="card">
    <h2>📍 Ubicación</h2>
    <a class="btn" href="https://www.google.com/maps?q=-25.4551648,-56.0106417" target="_blank">
      Ver en Google Maps
    </a>
  </div>

</div>

</body>
</html>
